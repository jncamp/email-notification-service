<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #222;">
<div style="max-width: 600px; margin: 0 auto; padding: 24px; border: 1px solid #ddd; border-radius: 8px;">
    <h2 style="color: #2c3e50; margin-top: 0;">Welcome</h2>

    <p>Hello <span th:text="${firstName}">there</span>,</p>

    <p>Welcome to the Email Notification Service demo.</p>

    <p>This is your first Thymeleaf-powered email 🎉</p>

    <hr style="border: none; border-top: 1px solid #eee; margin: 24px 0;" />

    <p style="font-size: 12px; color: #777;">Sent by your microservice.</p>
</div>
</body>
</html>
